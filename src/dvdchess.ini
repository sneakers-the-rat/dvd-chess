# DVD chess variant. Load with:
#   setoption name VariantPath value dvdchess.ini
# A bouncing "DVD logo" piece, introduced by pawn promotion on files b-g.
# It auto-advances diagonally each turn, bounces off edges/corners, flips color
# every turn, captures opposing pieces in its path, is blocked by (and next turn
# recaptures) friendly pieces, bounces off friendly DVDs, and treats kings as
# bumpers. It never gives check. On a side, its owner may nudge it one square
# along the edge (its whole turn) to redirect it; a nudge also suppresses that
# turn's color flip, leaving it capturable.
# The four custom pieces encode the four diagonal directions:
#   d = NE   v = NW   w = SE   y = SW
[dvdchess:chess]
customPiece1 = d:
customPiece2 = v:
customPiece3 = w:
customPiece4 = y:
dvdChess = true
pieceValueMg = d:200 v:200 w:200 y:200
pieceValueEg = d:200 v:200 w:200 y:200
