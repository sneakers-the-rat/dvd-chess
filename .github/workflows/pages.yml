name: Deploy DVD Chess site

# Compiles the DVD-fork engine to WebAssembly (ffish.js + ffish.wasm) and
# publishes docs/ to GitHub Pages. The wasm is built here, never committed.

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - name: Build ffish.js (DVD engine) to WebAssembly
        working-directory: src
        run: make -f Makefile_js build es6=yes

      - name: Stage compiled engine into docs/
        run: cp tests/js/ffish.js tests/js/ffish.wasm docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
